<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head th:replace="~{fragments/head :: head('食材登録・編集')}"></head>
<body class="bg-gray-50 min-h-screen">
<div th:replace="~{fragments/nav :: nav}"></div>

<div class="container mx-auto px-6 py-8">
  <div class="max-w-lg mx-auto bg-white rounded-lg shadow p-8">
    <h2 class="text-2xl font-bold text-gray-800 mb-6"
        th:text="${ingredient.id} == null ? '食材を追加' : '食材を編集'"></h2>

    <form th:action="${ingredient.id == null} ? @{/ingredients/new} : @{/ingredients/{id}/edit(id=${ingredient.id})}"
          th:object="${ingredient}"
          method="post"
          class="space-y-4">

      <div>
        <label for="name" class="block text-sm font-medium text-gray-700 mb-1">食材名</label>
        <input type="text" id="name" th:field="*{name}" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>
      </div>
      <div>
        <label for="quantity" class="block text-sm font-medium text-gray-700 mb-1">在庫数</label>
        <input type="number" id="quantity" th:field="*{quantity}" step="0.1" min="0" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>
      </div>
      <div>
        <label for="unit" class="block text-sm font-medium text-gray-700 mb-1">単位</label>
        <select id="unit" th:field="*{unit}" required
                class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400">
          <option value="">選択してください</option>
          <option value="個">個</option>
          <option value="本">本</option>
          <option value="枚">枚</option>
          <option value="袋">袋</option>
          <option value="缶">缶</option>
          <option value="g">g</option>
          <option value="kg">kg</option>
          <option value="ml">ml</option>
          <option value="L">L</option>
          <option value="パック">パック</option>
        </select>
      </div>
      <div>
        <label for="purchasedAt" class="block text-sm font-medium text-gray-700 mb-1">購入日</label>
        <input type="date" id="purchasedAt" th:field="*{purchasedAt}" required
               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="flex-1 bg-green-600 text-white py-2 rounded font-medium hover:bg-green-700 transition">
          保存
        </button>
        <a th:href="@{/ingredients}"
           class="flex-1 text-center border border-gray-300 py-2 rounded font-medium text-gray-600 hover:bg-gray-50 transition">
          キャンセル
        </a>
      </div>
    </form>
  </div>
</div>
</body>
</html>

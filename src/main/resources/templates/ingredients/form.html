<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head>
  <meta charset="UTF-8">
  <title>食材登録・編集 - PantryAI</title>
</head>
<body>
<h1>PantryAI</h1>
<h2 th:text="${ingredient.id} == null ? '食材を追加' : '食材を編集'"></h2>

<form th:action="${ingredient.id} == null ? @{/ingredients/new} : @{/ingredients/{id}/edit(id=${ingredient.id})}"
      th:object="${ingredient}"
      method="post">

  <div>
    <label for="name">食材名</label>
    <input type="text" id="name" th:field="*{name}" required/>
  </div>
  <div>
    <label for="quantity">在庫数</label>
    <input type="number" id="quantity" th:field="*{quantity}" step="0.1" min="0" required/>
  </div>
  <div>
    <label for="unit">単位</label>
    <select id="unit" th:field="*{unit}" required>
      <option value="">選択してください</option>
      <option value="個">個</option>
      <option value="本">本</option>
      <option value="枚">枚</option>
      <option value="袋">袋</option>
      <option value="缶">缶</option>
      <option value="g">g</option>
      <option value="kg">kg</option>
      <option value="ml">ml</option>
      <option value="L">L</option>
      <option value="パック">パック</option>
    </select>
  </div>
  <div>
    <label for="purchasedAt">購入日</label>
    <input type="date" id="purchasedAt" th:field="*{purchasedAt}" required/>
  </div>

  <button type="submit">保存</button>
  <a th:href="@{/ingredients}">キャンセル</a>
</form>
</body>
</html>

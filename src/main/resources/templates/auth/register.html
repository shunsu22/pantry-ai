<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ja">
<head th:replace="~{fragments/head :: head('新規登録')}"></head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
<div class="bg-white rounded-lg shadow-md p-8 w-full max-w-md">
  <h1 class="text-2xl font-bold text-green-600 text-center mb-2">PantryAI</h1>
  <h2 class="text-lg text-gray-600 text-center mb-6">新規登録</h2>

  <div th:if="${error}" class="bg-red-50 text-red-600 px-4 py-3 rounded mb-4 text-sm">
    <p th:text="${error}"></p>
  </div>

  <form th:action="@{/register}" method="post" class="space-y-4">
    <div>
      <label for="username" class="block text-sm font-medium text-gray-700 mb-1">ユーザー名</label>
      <input type="text" id="username" name="username" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>
    </div>
    <div>
      <label for="password" class="block text-sm font-medium text-gray-700 mb-1">パスワード</label>
      <input type="password" id="password" name="password" required
             class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-green-400"/>
    </div>
    <button type="submit"
            class="w-full bg-green-600 text-white py-2 rounded font-medium hover:bg-green-700 transition">
      登録
    </button>
  </form>

  <p class="text-center text-sm text-gray-500 mt-4">
    すでにアカウントをお持ちの方は
    <a th:href="@{/login}" class="text-green-600 hover:underline">ログイン</a>
  </p>
</div>
</body>
</html>

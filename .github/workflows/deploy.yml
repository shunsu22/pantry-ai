name: Build and Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: ソースコードを取得
        uses: actions/checkout@v4

      - name: Java 21 をセットアップ
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Gradle でビルド
        run: ./gradlew build -x test

      - name: GitHub Container Registry にログイン
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker イメージをビルド・push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/shunsu22/pantry-ai:latest

      - name: docker compose で再起動
        run: |
          cd ~/myapp
          docker compose pull
          docker compose up -d